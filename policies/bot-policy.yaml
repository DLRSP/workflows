version: 1
trusted_actors:
  - dlrsp-actions[bot]
  - app/dlrsp-actions
  - dependabot[bot]
  - pre-commit-ci[bot]
shim_actors:
  - dlrsp-bot
policies:
  - name: bot-auto-merge
    when:
      draft: false
      actor_in: trusted_actors
    gates:
      - ci_status:
          required:
            - ci / Analyze (python)
            - ci / Python 3.12 · Django 4.2
            # CodeQL code-scanning results gate (AR-033). Native check emitted by
            # github/codeql-action/analyze; blocks bot merge on new high alerts.
            - CodeQL
      - paths:
          deny:
            - .github/workflows/**
            - CODEOWNERS
      - semver:
          block: major
    then:
      - approve
      - enable_auto_merge
  - name: shim-auto-merge
    when:
      draft: false
      actor_in: shim_actors
    gates:
      - ci_status:
          required:
            - ci / Analyze (python)
            - ci / Python 3.12 · Django 4.2
            - CodeQL
      - paths:
          deny:
            - .github/workflows/**
            - CODEOWNERS
      - semver:
          block: major
    then:
      - approve
      - enable_auto_merge
  - name: default-fail
    when:
      actor_in: union(trusted_actors, shim_actors)
    then:
      - label:needs-human-review
      - comment:blocked-by-policy
