version: 1
trusted_actors:
  - dlrsp-actions[bot]
  - app/dlrsp-actions
  - dependabot[bot]
  - pre-commit-ci[bot]
shim_actors:
  - dlrsp-bot
policies:
  - name: bot-auto-merge
    when:
      draft: false
      actor_in: trusted_actors
    gates:
      - ci_status:
          required:
            - Verify Requirements / verify-dev-requirements (3.12, py312-dev.txt)
            - Verify Requirements / verify-test-requirements (3.12, py312-test.txt)
            - Verify Requirements / verify-django-requirements (3.12, 4.2)
      - paths:
          deny:
            - .github/workflows/**
            - CODEOWNERS
      - semver:
          block: major
    then:
      - approve
      - enable_auto_merge
  - name: shim-auto-merge
    when:
      draft: false
      actor_in: shim_actors
    gates:
      - ci_status:
          required:
            - Verify Requirements / verify-dev-requirements (3.12, py312-dev.txt)
            - Verify Requirements / verify-test-requirements (3.12, py312-test.txt)
            - Verify Requirements / verify-django-requirements (3.12, 4.2)
      - paths:
          deny:
            - .github/workflows/**
            - CODEOWNERS
      - semver:
          block: major
    then:
      - approve
      - enable_auto_merge
  - name: default-fail
    when:
      actor_in: union(trusted_actors, shim_actors)
    then:
      - label:needs-human-review
      - comment:blocked-by-policy
