name: Compatibility milestones
description: >-
  Upsert per-repository Python/Django compatibility milestones from the shared
  compat-timeline.yaml. Milestones stay open until each version EOL.
inputs:
  repository:
    description: owner/repo to sync milestones on
    required: true
  github-token:
    description: Installation token with repo issues:write
    required: true
  timeline-ref:
    description: Ref of DLRSP/workflows to read the timeline from
    required: false
    default: main
  dry-run:
    description: When "1", report actions without writing
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'
    - name: Sync compatibility milestones
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPOSITORY: ${{ inputs.repository }}
        TIMELINE_REF: ${{ inputs.timeline-ref }}
        DRY_RUN: ${{ inputs.dry-run }}
      run: |
        python -m pip install --quiet --disable-pip-version-check pyyaml
        python "${{ github.action_path }}/compat_milestones.py"
