name: Compat rollup sync
description: >-
  Aggregate per-version compatibility across published packages using sub-issues:
  one parent issue per active Python/Django version, one sub-issue per package
  (closed when the package declares support). Requires issues:write on the hub
  repo. Per-repo compat: milestones are left untouched.
inputs:
  org:
    description: Organization login that owns the packages
    required: true
  github-token:
    description: App token with issues:write on the hub repo
    required: true
  hub-repo:
    description: owner/repo that holds parent + sub-issues
    required: false
    default: DLRSP/workflows
  timeline-ref:
    description: Ref of DLRSP/workflows to read compat-timeline.yaml from
    required: false
    default: main
  packages:
    description: Optional CSV of repo names to override discovery
    required: false
    default: ""
  dry-run:
    description: When "1", report actions without writing
    required: false
    default: ""
runs:
  using: composite
  steps:
    - uses: actions/setup-python@v6
      with:
        python-version: "3.x"

    - name: Sync compatibility rollup
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        ORG: ${{ inputs.org }}
        HUB_REPO: ${{ inputs.hub-repo }}
        TIMELINE_REF: ${{ inputs.timeline-ref }}
        PACKAGES: ${{ inputs.packages }}
        DRY_RUN: ${{ inputs.dry-run }}
      run: |
        python -m pip install --quiet pyyaml
        python "${{ github.action_path }}/compat_rollup.py"
