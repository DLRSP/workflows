name: Compat board sync
description: >-
  Track the compatibility rollup parent issues (one per supported version) on an
  org-level GitHub Project v2 roadmap, with Released/EOL dates for the bars and
  native sub-issue progress for "compatible packages / total". Requires an
  org-scoped token with organization-projects:write and issues:read.
inputs:
  org:
    description: Organization login that owns the Project v2
    required: true
  github-token:
    description: Org-scoped App token (org Projects RW + issues read)
    required: true
  hub-repo:
    description: owner/repo holding the rollup parent + sub-issues
    required: false
    default: DLRSP/compatibility
  project-title:
    description: Project v2 title to find/create (fallback if project-number unset)
    required: false
    default: Compatibility Roadmap
  project-number:
    description: Org Project v2 number to target directly (preferred over title)
    required: false
    default: "1"
  timeline-ref:
    description: Ref of DLRSP/workflows to read compat-timeline.yaml from
    required: false
    default: main
  dry-run:
    description: When "1", report actions without writing
    required: false
    default: ""
runs:
  using: composite
  steps:
    - uses: actions/setup-python@v6
      with:
        python-version: "3.x"

    - name: Sync compatibility board
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        ORG: ${{ inputs.org }}
        HUB_REPO: ${{ inputs.hub-repo }}
        PROJECT_TITLE: ${{ inputs.project-title }}
        PROJECT_NUMBER: ${{ inputs.project-number }}
        TIMELINE_REF: ${{ inputs.timeline-ref }}
        DRY_RUN: ${{ inputs.dry-run }}
      run: |
        python -m pip install --quiet pyyaml
        python "${{ github.action_path }}/compat_board.py"
