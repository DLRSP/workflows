name: Compat timeline EOL sync
description: >-
  Verify compat-timeline.yaml against endoflife.date and patch drifting Python
  and Django dates in place (comments preserved). Reports still-active upstream
  cycles that are not tracked yet. Sets the ``changed`` output; the caller opens
  a pull request when the timeline changed.
inputs:
  timeline-file:
    description: Path to compat-timeline.yaml in the checkout
    required: true
  summary-file:
    description: Path to write a markdown drift summary (for the PR body)
    required: false
    default: ""
outputs:
  changed:
    description: "true when the timeline was patched"
    value: ${{ steps.sync.outputs.changed }}
runs:
  using: composite
  steps:
    - uses: actions/setup-python@v6
      with:
        python-version: "3.x"

    - name: Verify timeline against endoflife.date
      id: sync
      shell: bash
      env:
        TIMELINE_FILE: ${{ inputs.timeline-file }}
        SUMMARY_FILE: ${{ inputs.summary-file }}
      run: |
        python -m pip install --quiet pyyaml
        python "${{ github.action_path }}/compat_eol_sync.py"
