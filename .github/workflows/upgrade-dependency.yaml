# File: .github/workflows/upgrade-dependency.yml
# Reference: https://www.oddbird.net/2022/06/01/dependabot-single-pull-request/
---
name: Upgrade dependencies

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'requirements/*.in'
  schedule:
    # Runs every Monday at 8:00 UTC
    - cron: '0 8 * * *'

jobs:
  upgrade:
    name: Upgrade & Open Pull Request
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: true
      max-parallel: 4
      matrix:
        # Explicit matrix aligned with tox envlist (no invalid py/django combos).
        include:
          - {python-version: "3.9", django-version: "4.2", experimental: true}
          - {python-version: "3.10", django-version: "3.2", experimental: true}
          - {python-version: "3.10", django-version: "4.2", experimental: false}
          - {python-version: "3.10", django-version: "5.2", experimental: true}
          - {python-version: "3.11", django-version: "4.2", experimental: false}
          - {python-version: "3.11", django-version: "5.2", experimental: true}
          - {python-version: "3.12", django-version: "4.2", experimental: false}
          - {python-version: "3.12", django-version: "5.2", experimental: true}
          - {python-version: "3.13", django-version: "5.2", experimental: true}
          - {python-version: "3.14", django-version: "5.2", experimental: true}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Get pip cache dir
        id: pip-cache
        run: |
          echo "dir=$(pip cache dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5.0.3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements/*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Set Python and Django version's file variable
        run: |
          RAW_DJANGO_ENV="py${{ matrix.python-version }}-django${{ matrix.django-version }}"
          echo "DJANGO_ENV=${RAW_DJANGO_ENV//./}" >> "$GITHUB_ENV"

      - name: Upgrade Python dependencies ${{ matrix.python-version }}
        run: |
          typeset -A ranges=(["3.2"]="Django>=3.2a1,<3.3" ["4.2"]="Django>=4.2,<4.3" ["5.2"]="Django>=5.2,<5.3")
          if [[ -f "requirements/runtime.in" ]]; then
            RUNTIME_IN="requirements/runtime.in"
          elif [[ -f "requirements/requirements.in" ]]; then
            RUNTIME_IN="requirements/requirements.in"
          else
            echo "❌ No requirements/runtime.in or requirements/requirements.in found"
            exit 1
          fi
          pip install -U pip pip-tools
          pip-compile --upgrade --generate-hashes --allow-unsafe \
                      -P "${ranges["${{ matrix.django-version }}"]}" \
                      -o "requirements/${{ env.DJANGO_ENV }}.txt" \
                      "$RUNTIME_IN"

      - name: Upload Python dependencies ${{ matrix.python-version }} for Django ${{ matrix.django-version }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.DJANGO_ENV }}.txt
          path: requirements/${{ env.DJANGO_ENV }}.txt

  pull-request:
    name: Open Pull Request
    runs-on: ubuntu-latest
    needs: upgrade
    env:
      BRANCH_NAME: auto-dependency-upgrades-py-django
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: requirements
          pattern: py*
          merge-multiple: true

      - name: Create App installation token
        id: dlrsp-token
        uses: DLRSP/workflows/.github/actions/dlrsp-actions-token@main
        with:
          github-app-id: ${{ secrets.DLRSP_ACTIONS_APP_ID }}
          github-app-private-key: ${{ secrets.DLRSP_ACTIONS_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.dlrsp-token.outputs.token }}
          commit-message: "Automated dependency upgrades"
          committer: GitHub <noreply@github.com>
          signoff: false
          branch: ${{ env.BRANCH_NAME }}
          delete-branch: true
          title: 'Automated dependency upgrades'
          body: "Full log: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          labels: |
            📦 dependencies
            python
          draft: false
