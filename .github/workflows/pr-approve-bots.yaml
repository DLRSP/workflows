---
name: Approve and Auto-Merge Bot PRs

on:
  workflow_call:
    inputs:
      enable_auto_merge:
        description: 'Enable auto-merge for bot PRs'
        required: false
        default: true
        type: boolean
      workflows-ref:
        description: Ref of DLRSP/workflows for policy gate
        required: false
        type: string
        default: main

permissions:
  contents: write
  pull-requests: write

jobs:
  policy-gate:
    name: Policy gate (deprecated wrapper)
    uses: DLRSP/workflows/.github/workflows/pr-policy-gate.yaml@main
    with:
      workflows-ref: ${{ inputs.workflows-ref }}
      enable-auto-merge: ${{ inputs.enable_auto_merge }}
    secrets: inherit
