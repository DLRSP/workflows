---
name: Compat Board Sync

# Org-level dashboard: track the compatibility rollup parent issues (one per
# supported Python/Django version, held in the hub repo) on a single
# organization Project v2 roadmap, with Released/EOL dates for the bars and
# native sub-issue progress for "compatible packages / total". A single runner
# owns the board. Org Projects writes use an org-scoped dlrsp-actions App token
# (organization-projects:write); GITHUB_TOKEN stays read-only. Runs only on
# DLRSP/workflows, never via workflow_call.
"on":
  workflow_dispatch:
    inputs:
      dry-run:
        description: When "1", report actions without writing
        required: false
        default: ""
  schedule:
    # Monday 05:47 UTC, after the rollup creates the parent issues (05:27).
    - cron: '47 5 * * 1'

concurrency:
  group: compat-board-sync
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  board:
    name: Sync org compatibility board
    runs-on: ubuntu-22.04
    steps:
      - name: Create org-scoped App token
        id: dlrsp-token
        uses: DLRSP/workflows/.github/actions/dlrsp-actions-token@main
        with:
          github-app-id: ${{ secrets.DLRSP_ACTIONS_APP_ID }}
          github-app-private-key: ${{ secrets.DLRSP_ACTIONS_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-organization-projects: write
          permission-issues: read
          permission-contents: read
          permission-metadata: read

      - name: Sync compatibility board
        uses: DLRSP/workflows/.github/actions/compat-board@main
        with:
          org: ${{ github.repository_owner }}
          github-token: ${{ steps.dlrsp-token.outputs.token }}
          dry-run: ${{ inputs.dry-run }}
