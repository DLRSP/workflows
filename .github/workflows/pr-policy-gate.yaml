---
name: PR policy gate

on:
  workflow_call:
    inputs:
      workflows-ref:
        description: Ref of DLRSP/workflows for policy and composites
        required: false
        type: string
        default: main
      policy-path:
        description: Path to bot-policy.yaml inside workflows repo
        required: false
        type: string
        default: policies/bot-policy.yaml
      enable-auto-merge:
        description: Enable auto-merge when policy approves
        required: false
        type: boolean
        default: true
      dependabot-update-type:
        description: Optional dependabot semver update type
        required: false
        type: string
        default: ""
    outputs:
      decision:
        description: approve | block | skip
        value: ${{ jobs.policy.outputs.decision }}
      reason:
        description: Evaluation reason
        value: ${{ jobs.policy.outputs.reason }}

jobs:
  policy:
    name: Policy gate (bot PR approve/merge)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      decision: ${{ steps.evaluate.outputs.decision }}
      reason: ${{ steps.evaluate.outputs.reason }}
    steps:
      - name: Checkout workflows policy bundle
        uses: actions/checkout@v6
        with:
          repository: DLRSP/workflows
          ref: ${{ inputs.workflows-ref }}
          path: dlrsp-workflows
          sparse-checkout: |
            policies
            .github/actions/dlrsp-actions-token
            .github/actions/evaluate-bot-policy
          sparse-checkout-cone-mode: false

      - name: Fetch dependabot metadata
        if: github.event.pull_request.user.login == 'dependabot[bot]'
        id: dependabot-metadata
        continue-on-error: true
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          skip-commit-verification: true

      - name: Resolve dependabot update type
        if: github.event.pull_request.user.login == 'dependabot[bot]'
        id: dependabot-update-type
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          update_type="${{ steps.dependabot-metadata.outputs.update-type }}"
          if [[ -z "${update_type}" ]]; then
            update_type="$(gh pr view "${{ github.event.pull_request.number }}" \
              --repo "${{ github.repository }}" \
              --json body -q .body \
              | grep -oE 'update-type: version-update:semver-(major|minor|patch)' \
              | head -1 \
              | cut -d' ' -f2 || true)"
          fi
          echo "value=${update_type}" >> "$GITHUB_OUTPUT"

      - name: Evaluate bot policy
        id: evaluate
        uses: ./dlrsp-workflows/.github/actions/evaluate-bot-policy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          policy-file: dlrsp-workflows/${{ inputs.policy-path }}
          actor: ${{ github.event.pull_request.user.login }}
          pr-number: ${{ github.event.pull_request.number }}
          draft: ${{ github.event.pull_request.draft }}
          dependabot-update-type: >-
            ${{ inputs.dependabot-update-type != '' && inputs.dependabot-update-type
            || steps.dependabot-update-type.outputs.value }}

      - name: Create App installation token
        if: >-
          steps.evaluate.outputs.decision == 'approve'
          || steps.evaluate.outputs.decision == 'block'
        id: dlrsp-token
        uses: ./dlrsp-workflows/.github/actions/dlrsp-actions-token
        with:
          github-app-id: ${{ secrets.DLRSP_ACTIONS_APP_ID }}
          github-app-private-key: ${{ secrets.DLRSP_ACTIONS_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
          permission-actions: read
          permission-metadata: read

      - name: Approve pull request
        if: >-
          steps.evaluate.outputs.decision == 'approve'
          && contains(steps.evaluate.outputs.actions, 'approve')
          && github.event.pull_request.user.login != 'app/dlrsp-actions'
          && github.event.pull_request.user.login != 'dlrsp-actions[bot]'
        run: gh pr review --approve "${{ github.event.pull_request.html_url }}"
        env:
          GH_TOKEN: ${{ steps.dlrsp-token.outputs.token }}

      - name: Clear stale policy block label
        if: steps.evaluate.outputs.decision == 'approve'
        run: >-
          gh pr edit "${{ github.event.pull_request.number }}"
          --repo "${{ github.repository }}"
          --remove-label "needs-human-review"
          2>/dev/null || true
        env:
          GH_TOKEN: ${{ steps.dlrsp-token.outputs.token }}

      - name: Enable auto-merge
        if: >-
          steps.evaluate.outputs.decision == 'approve'
          && contains(steps.evaluate.outputs.actions, 'enable_auto_merge')
          && inputs.enable-auto-merge
          && github.event.pull_request.user.login != 'app/dlrsp-actions'
          && github.event.pull_request.user.login != 'dlrsp-actions[bot]'
        run: gh pr merge --auto --rebase "${{ github.event.pull_request.html_url }}"
        env:
          GH_TOKEN: ${{ steps.dlrsp-token.outputs.token }}

      # The App authors these PRs and cannot approve its own PR. The required
      # review is satisfied by listing the App as a ruleset bypass actor
      # (actor_type: Integration, bypass_mode: pull_request). We MUST merge via
      # the REST merge API, not `gh pr merge`: the CLI refuses client-side when
      # mergeStateStatus is BLOCKED (review still "required" for non-bypass
      # actors) and never calls the API, so the App's server-side bypass is
      # never evaluated. The PUT .../merge endpoint evaluates the bypass.
      - name: Merge self-authored bot PR
        if: >-
          steps.evaluate.outputs.decision == 'approve'
          && contains(steps.evaluate.outputs.actions, 'enable_auto_merge')
          && inputs.enable-auto-merge
          && (github.event.pull_request.user.login == 'app/dlrsp-actions'
          || github.event.pull_request.user.login == 'dlrsp-actions[bot]')
        run: >-
          gh api -X PUT
          "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/merge"
          -f merge_method=rebase
        env:
          GH_TOKEN: ${{ steps.dlrsp-token.outputs.token }}

      - name: Ensure needs-human-review label exists
        if: >-
          steps.evaluate.outputs.decision == 'block'
          && contains(steps.evaluate.outputs.actions, 'label:needs-human-review')
        run: |
          gh label create "needs-human-review" \
            --repo "${{ github.repository }}" \
            --color "B60205" \
            --description "Policy gate blocked; human review required" \
            2>/dev/null || true
        env:
          GH_TOKEN: ${{ steps.dlrsp-token.outputs.token }}

      - name: Apply block label
        if: >-
          steps.evaluate.outputs.decision == 'block'
          && contains(steps.evaluate.outputs.actions, 'label:needs-human-review')
        run: >-
          gh pr edit "${{ github.event.pull_request.number }}"
          --repo "${{ github.repository }}"
          --add-label "needs-human-review"
        env:
          GH_TOKEN: ${{ steps.dlrsp-token.outputs.token }}

      - name: Comment on blocked PR
        if: >-
          steps.evaluate.outputs.decision == 'block'
          && contains(steps.evaluate.outputs.actions, 'comment:blocked-by-policy')
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "Policy gate blocked this PR: ${{ steps.evaluate.outputs.reason }}"
        env:
          GH_TOKEN: ${{ steps.dlrsp-token.outputs.token }}
