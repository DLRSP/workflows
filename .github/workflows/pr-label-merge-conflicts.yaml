---
name: Auto label merge conflicts

permissions:
  issues: write
  pull-requests: write

on:
  workflow_call:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  label-merge-conflicts:
    if: github.repository_owner == 'DLRSP'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Label merge conflicts
        id: label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          label="🔀 needs rebase or merge"
          mapfile -t prs < <(
            gh pr list --repo "${{ github.repository }}" --state open \
              --json number,mergeable -q '.[] | select(.mergeable == "CONFLICTING") | .number'
          )
          if ((${#prs[@]} == 0)); then
            echo "No conflicting open PRs"
            exit 0
          fi
          for n in "${prs[@]}"; do
            gh pr edit "$n" --repo "${{ github.repository }}" --add-label "$label" || true
          done
        continue-on-error: true
      
      - name: Handle label error
        if: steps.label.outcome == 'failure'
        run: |
          echo "⚠️  Warning: Label '🔀 needs rebase or merge' not found in repository"
          echo "ℹ️  To fix this, add the label manually in repository settings or use the labels.yaml workflow to sync labels"
          echo "ℹ️  This is a non-critical job and the workflow will continue"
