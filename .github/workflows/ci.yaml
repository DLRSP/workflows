---
# - Test matrix: prepare-matrix reads tox.ini and runs one job per tox env (py*-django*).
# - Fallback without tox.ini: legacy Python-only matrix with tox --py current.
# - Override: workflow_call input tox-matrix-mode=python-only restores previous behaviour.
name: CI/CD
on:
  workflow_call:
    inputs:
      tox-matrix-mode:
        description: >-
          auto: one GitHub job per tox env when tox.ini defines py*-django* envs;
          python-only: legacy matrix (one job per Python, tox --py current).
        required: false
        type: string
        default: auto
      requirements-ref:
        description: DLRSP/requirements git ref for dev/test lock URLs
        required: false
        type: string
        default: main
      install-test-deps:
        description: Install org py*-test.txt from DLRSP/requirements (CI only)
        required: false
        type: boolean
        default: false
      assert-wheel-locks:
        description: Assert runtime py*-django*.txt locks are embedded in the wheel (ADR-004)
        required: false
        type: boolean
        default: false
      policy-path:
        description: Bot policy file path inside DLRSP/workflows (policy gate)
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      tox-matrix-mode:
        description: Matrix mode (auto or python-only)
        required: false
        type: string
        default: auto
      requirements-ref:
        description: DLRSP/requirements git ref for dev/test lock URLs
        required: false
        type: string
        default: main
      install-test-deps:
        description: Install org py*-test.txt from DLRSP/requirements
        required: false
        type: boolean
        default: false
      assert-wheel-locks:
        description: Assert runtime locks embedded in wheel
        required: false
        type: boolean
        default: false
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  prepare-matrix:
    name: Prepare test matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
      mode: ${{ steps.build.outputs.mode }}
      count: ${{ steps.build.outputs.count }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Build matrix from tox environments
        id: build
        # Cross-repo ref: with workflow_call, ./.github/actions resolves in the *caller* repo (django-lang), not workflows.
        uses: DLRSP/workflows/.github/actions/build-tox-matrix@main
        with:
          mode: ${{ inputs.tox-matrix-mode || 'auto' }}

      - name: Log matrix summary
        shell: bash
        run: |
          echo "Matrix mode: ${{ steps.build.outputs.mode }}"
          echo "Combinations: ${{ steps.build.outputs.count }}"
          echo '${{ steps.build.outputs.matrix }}' | python -m json.tool

  test:
    name: >-
      ${{ matrix.django-version && format('Python {0} · Django {1}', matrix.python-version, matrix.django-version) || format('Python {0}', matrix.python-version) }}${{ matrix.legacy == true && ' · legacy' || '' }}${{ matrix.experimental == true && ' · experimental' || '' }}
    runs-on: ubuntu-latest
    needs: prepare-matrix
    # Required: Python 3.10–3.12 + Django 4.2. Optional: legacy Python 3.9 / Django 3.2, experimental Python 3.13+ / Django 5.2.
    continue-on-error: ${{ matrix.optional == true }}
    strategy:
      max-parallel: 10
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        if: ${{ always() && hashFiles('setup.py', 'pyproject.toml', 'tox.ini') }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        if: ${{ always() && hashFiles('setup.py', 'pyproject.toml', 'tox.ini') }}
        run: |
          sudo apt-get update && sudo apt-get install gettext

      - name: Get pip cache dir
        if: ${{ always() && hashFiles('setup.py', 'pyproject.toml', 'tox.ini') }}
        id: pip-cache
        run: |
          echo "dir=$(pip cache dir)" >> "$GITHUB_OUTPUT"

      - name: Set Python version's file variable
        run: |
          RAW_PY_ENV="py${{ matrix.python-version }}"
          echo "PY_ENV=${RAW_PY_ENV//./}" >> "$GITHUB_ENV"

      - name: Install Python dependencies ${{ matrix.python-version }} (dev)
        if: ${{ always() && hashFiles('setup.py', 'pyproject.toml', 'tox.ini') }}
        run: >-
          python -m pip install --upgrade --no-deps
          -r https://raw.githubusercontent.com/DLRSP/requirements/${{ inputs.requirements-ref || 'main' }}/${{ env.PY_ENV }}-dev.txt

      - name: Install Python test dependencies ${{ matrix.python-version }} (CI)
        if: >-
          ${{
            always()
            && hashFiles('setup.py', 'pyproject.toml', 'tox.ini')
            && inputs.install-test-deps == true
          }}
        run: >-
          python -m pip install --upgrade --no-deps
          -r https://raw.githubusercontent.com/DLRSP/requirements/${{ inputs.requirements-ref || 'main' }}/${{ env.PY_ENV }}-test.txt

      - name: Run tox environment ${{ matrix.tox-env }}
        if: ${{ always() && hashFiles('tox.ini') && matrix.matrix-mode == 'tox-env' }}
        run: tox -e "${{ matrix.tox-env }}"

      - name: Run tox targets for Python ${{ matrix.python-version }}
        if: ${{ always() && hashFiles('tox.ini') && matrix.matrix-mode == 'python-only' }}
        run: tox --py current

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5.5.2
        if: ${{ always() && hashFiles('tox.ini') }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: ${{ matrix.tox-env || format('py{0}', matrix.python-version) }}

  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    needs: test
    permissions:
      actions: read
      contents: read
      checks: write
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'python' ]
    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-python@v6
      with:
        python-version: "3.x"

    - name: Get pip cache dir
      id: pip-cache
      run: |
        echo "dir=$(pip cache dir)" >> "$GITHUB_OUTPUT"

    - uses: actions/cache@v5.0.3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements/*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install OS dependencies
      run: |
        sudo apt-get install -y gettext

    - name: Install Python dependencies
      run: pip install black flake8 flake8-pyproject

    - name: Run linters
      uses: wearerequired/lint-action@v2
      with:
          black: true
          flake8: true
#          stylelint: true
#          eslint: true
#          prettier: true

    - name: Initialize CodeQL
      if: ${{ always() && hashFiles('setup.py', 'pyproject.toml', 'tox.ini') }}
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}

    - name: Autobuild
      if: ${{ always() && hashFiles('setup.py', 'pyproject.toml', 'tox.ini') }}
      uses: github/codeql-action/autobuild@v4

    - name: Perform CodeQL Analysis
      if: ${{ always() && hashFiles('setup.py', 'pyproject.toml', 'tox.ini') }}
      uses: github/codeql-action/analyze@v4

  policy-gate:
    name: Policy gate (bot PR approve/merge)
    needs: [test, analyze]
    if: >-
      github.event_name == 'pull_request'
      && !github.event.pull_request.draft
      && (
        contains(fromJSON('["dlrsp-actions[bot]","dlrsp-bot"]'), github.actor)
        || contains(fromJSON('["dlrsp-actions[bot]","dlrsp-bot"]'), github.event.pull_request.user.login)
      )
    uses: DLRSP/workflows/.github/workflows/pr-policy-gate.yaml@main
    secrets: inherit
    with:
      policy-path: >-
        ${{ inputs.policy-path != '' && inputs.policy-path
        || (github.repository == 'DLRSP/workflows' && 'policies/bot-policy-workflows.yaml'
        || 'policies/bot-policy.yaml') }}

  build:
    name: Build wheels
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    needs: [test, analyze]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        if: ${{ always() && hashFiles('setup.py', 'pyproject.toml') }}
        with:
          python-version: "3.x"

      - name: Install OS dependencies
        if: ${{ always() && hashFiles('setup.py', 'pyproject.toml') }}
        run: |
          sudo apt-get update && sudo apt-get install -y gettext

      - name: Install Python dependencies
        if: ${{ always() && hashFiles('setup.py', 'pyproject.toml') }}
        run: |
          python -m pip install --upgrade pip setuptools wheel build django

      - name: Compile locale catalogs
        if: ${{ always() && hashFiles('src/**/locale/**') != '' }}
        uses: DLRSP/workflows/.github/actions/compile-locale-catalogs@main

      - name: Build sdist and wheel (setup.py — custom hooks)
        if: ${{ always() && hashFiles('setup.py') }}
        run: |
          python setup.py sdist bdist_wheel

      - name: Build sdist and wheel (PEP 517, pyproject.toml only)
        if: ${{ always() && hashFiles('pyproject.toml') && !hashFiles('setup.py') }}
        run: |
          python -m build --sdist --wheel

      - name: Assert runtime locks in wheel
        if: >-
          ${{
            always()
            && hashFiles('pyproject.toml')
            && inputs.assert-wheel-locks == true
          }}
        run: |
          python << 'PYEOF'
          import glob
          import sys
          import tomllib
          import zipfile
          from pathlib import Path

          dist = Path("dist")
          wheels = sorted(dist.glob("*.whl"))
          if not wheels:
              print("❌ No wheel found in dist/")
              sys.exit(1)
          wheel_path = wheels[0]
          print(f"Checking wheel: {wheel_path.name}")

          with zipfile.ZipFile(wheel_path) as zf:
              names = zf.namelist()

          forbidden = []
          for name in names:
              base = name.rsplit("/", 1)[-1]
              if base.endswith(".in"):
                  forbidden.append(name)
              elif "-dev.txt" in base or "-test.txt" in base:
                  forbidden.append(name)
          if forbidden:
              print("❌ Forbidden paths in wheel (only runtime py*-django*.txt allowed):")
              for item in forbidden:
                  print(f"  - {item}")
              sys.exit(1)

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          project_name = pyproject.get("project", {}).get("name", "")
          data_files = pyproject.get("tool", {}).get("setuptools", {}).get("data-files", {})

          expected_sources = []
          for dest, sources in data_files.items():
              if "requirements" not in dest:
                  continue
              for src in sources:
                  expected_sources.append((src, dest, Path(src).name))

          if not expected_sources:
              expected_sources = [
                  (str(p), f"share/{project_name}/requirements", p.name)
                  for p in sorted(Path("requirements").glob("py*-django*.txt"))
              ]

          if not expected_sources:
              print("ℹ️  No runtime lock files configured; skipping embed assert")
              sys.exit(0)

          missing = []
          for src, dest, filename in expected_sources:
              if not Path(src).is_file():
                  print(f"❌ Source lock missing on disk: {src}")
                  sys.exit(1)
              dest_suffix = f"{dest.rstrip('/')}/{filename}".lstrip("./")
              if not any(n.replace("\\", "/").endswith(dest_suffix) for n in names):
                  missing.append(dest_suffix)

          if missing:
              print("❌ Runtime locks missing from wheel:")
              for item in missing:
                  print(f"  - {item}")
              sys.exit(1)

          print(f"✅ All {len(expected_sources)} runtime lock(s) present; no forbidden artifacts")
          PYEOF

      - name: Store the distribution packages
        if: ${{ always() && hashFiles('setup.py', 'pyproject.toml') }}
        uses: actions/upload-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

  build-cross:
    name: Build wheels on ${{ matrix.os }}
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    needs: [test, analyze]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-13, macos-14 ]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        if: ${{ always() && hashFiles('setup.py', 'pyproject.toml') }}
        with:
          python-version: "3.x"

#      - name: Install OS dependencies
#        if: ${{ always() && hashFiles('setup.py', 'pyproject.toml') }}
#        run: |
#          sudo apt-get install -y gettext

      - name: Install OS dependencies Ubuntu
        if: ${{ always() && hashFiles('setup.py', 'pyproject.toml') && matrix.os == 'ubuntu-latest' }}
        run: |
          sudo apt-get update && sudo apt-get install -y gettext

      - name: Install OS dependencies MacOS
        if: >-
          ${{
            always()
            && hashFiles('setup.py', 'pyproject.toml')
            && startsWith(matrix.os, 'macos')
          }}
        run: |
          brew install gettext

      - name: Install Python dependencies
        if: ${{ always() && hashFiles('setup.py', 'pyproject.toml') }}
        run: |
          python -m pip install --upgrade pip setuptools wheel build django

      - name: Compile locale catalogs
        if: >-
          ${{
            always()
            && hashFiles('src/**/locale/**') != ''
            && matrix.os != 'windows-latest'
          }}
        uses: DLRSP/workflows/.github/actions/compile-locale-catalogs@main

      - name: Build sdist and wheel (setup.py — custom hooks)
        if: ${{ always() && hashFiles('setup.py') }}
        run: |
          python setup.py sdist bdist_wheel

      - name: Build sdist and wheel (PEP 517, pyproject.toml only)
        if: ${{ always() && hashFiles('pyproject.toml') && !hashFiles('setup.py') }}
        run: |
          python -m build --sdist --wheel

      - name: Install cibuildwheel
        if: ${{ always() && hashFiles('setup.py', 'pyproject.toml') }}
        run: |
          python -m pip install cibuildwheel==2.17.0

      - name: Build wheels
        if: ${{ always() && hashFiles('setup.py', 'pyproject.toml') }}
        run: |
          python -m cibuildwheel --output-dir wheelhouse

      - uses: actions/upload-artifact@v6
        if: ${{ always() && hashFiles('setup.py', 'pyproject.toml') }}
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  release:
    name: GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    runs-on: ubuntu-latest
    needs: [test, analyze, build]
    steps:
      - uses: actions/checkout@v6

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_TOKEN }}

      - name: Download all the dists
        if: ${{ always() && hashFiles('setup.py', 'pyproject.toml') }}
        uses: actions/download-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

      - name: Update Release
        id: update_release
        uses: softprops/action-gh-release@v2
        if: ${{ always() && hashFiles('setup.py', 'pyproject.toml') }}
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        with:
          files: |
            ./dist/*.whl
            ./wheelhouse/*.whl

  deploy:
    name: PyPI Deploy
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    runs-on: ubuntu-latest
    needs: [test, analyze, build, release]
    steps:
      - uses: actions/checkout@v6

      - name: Download all the dists
        if: ${{ always() && hashFiles('setup.py', 'pyproject.toml') }}
        uses: actions/download-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package
        if: ${{ always() && hashFiles('setup.py', 'pyproject.toml') }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
