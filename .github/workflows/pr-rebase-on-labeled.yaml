---
name: Rebase PR (label)

on:
  workflow_call:
  pull_request:
    types: [labeled]

jobs:
  rebase:
    if: ${{ github.event.label.name == 'rebase' }}
    name: Rebase
    runs-on: ubuntu-latest
    steps:
      - name: Create App installation token
        id: dlrsp-token
        uses: ./.github/actions/dlrsp-actions-token
        with:
          github-app-id: ${{ secrets.DLRSP_ACTIONS_APP_ID }}
          github-app-private-key: ${{ secrets.DLRSP_ACTIONS_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: git checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.dlrsp-token.outputs.token }}
          fetch-depth: 0

      - name: automatic rebase
        uses: cirrus-actions/rebase@1.8
        env:
          GITHUB_TOKEN: ${{ steps.dlrsp-token.outputs.token }}

      - name: remove label
        if: always()
        uses: actions-ecosystem/action-remove-labels@v1
        with:
          labels: rebase