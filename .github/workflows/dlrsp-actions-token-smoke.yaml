---
name: DLRSP Actions token smoke

on:
  workflow_dispatch:

jobs:
  token-smoke:
    name: TS-01 App installation token
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create App installation token
        id: dlrsp-token
        uses: ./.github/actions/dlrsp-actions-token
        with:
          github-app-id: ${{ secrets.DLRSP_ACTIONS_APP_ID }}
          github-app-private-key: ${{ secrets.DLRSP_ACTIONS_PRIVATE_KEY }}
          permission-metadata: read
          permission-contents: read

      - name: Verify installation token on repository API
        run: |
          gh --version
          gh api "repos/${{ github.repository }}" -q .full_name
        env:
          GH_TOKEN: ${{ steps.dlrsp-token.outputs.token }}
