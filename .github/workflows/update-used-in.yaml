---
name: Update Used In Section

on:
  workflow_call:
    secrets: inherit

  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/*.yaml'
      - '.github/workflows/*.yml'
      - '.github/scripts/update_used_in.py'
      - README.md

jobs:
  update-used-in-central:
    if: github.repository == 'DLRSP/workflows' && github.event_name != 'workflow_call'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.BOT_PAT || secrets.PERSONAL_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --upgrade pip PyGithub

      - name: Update README (workflows consumers)
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_PAT || secrets.PERSONAL_TOKEN || secrets.GITHUB_TOKEN }}
        run: python .github/scripts/update_used_in.py central --root .

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.BOT_PAT || secrets.PERSONAL_TOKEN || secrets.GITHUB_TOKEN }}
          commit-message: 'docs: update Used in section (workflows consumers)'
          title: 'docs: update Used in section'
          body: |
            Updates the **Used in** section in `README.md` for repositories that reference `DLRSP/workflows` reusable workflows.

            ---
            Auto-generated by `update-used-in.yaml`.
          branch: update-used-in
          delete-branch: true
          add-paths: |
            README.md

  # Reusable: caller repo may define `.github/used-in.yaml` and marker blocks in docs; if the config is absent, this job no-ops.
  update-used-in-markers:
    if: github.event_name == 'workflow_call'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.BOT_PAT || secrets.PERSONAL_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Detect .github/used-in.yaml
        id: used_in
        run: |
          if [[ -f .github/used-in.yaml ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.used_in.outputs.enabled == 'true'
        with:
          repository: ${{ github.action_repository || 'DLRSP/workflows' }}
          ref: ${{ github.action_ref || 'main' }}
          path: _workflow_tools
          sparse-checkout: |
            .github/scripts
          sparse-checkout-cone-mode: false
          token: ${{ secrets.BOT_PAT || secrets.PERSONAL_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        if: steps.used_in.outputs.enabled == 'true'
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.used_in.outputs.enabled == 'true'
        run: pip install --upgrade pip PyGithub PyYAML

      - name: Sync marker sections from code search
        if: steps.used_in.outputs.enabled == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_PAT || secrets.PERSONAL_TOKEN || secrets.GITHUB_TOKEN }}
        run: python _workflow_tools/.github/scripts/update_used_in.py consumer --root .

      - name: Create Pull Request
        if: steps.used_in.outputs.enabled == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.BOT_PAT || secrets.PERSONAL_TOKEN || secrets.GITHUB_TOKEN }}
          commit-message: 'docs: sync Used in marker sections'
          title: 'docs: sync Used in marker sections'
          body: |
            Updates HTML-delimited **used-in** blocks when `.github/used-in.yaml` is present and matching markers exist in the repo (for example in `README.md` or under `docs/`).

            ---
            Auto-generated by `DLRSP/workflows` → `update-used-in.yaml` (`workflow_call`).
          branch: sync-used-in-markers
          delete-branch: true
